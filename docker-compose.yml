# Docker Compose for SupaConsole Production Deployment
# Includes centralized auth option (Authentik) for use across all your lab projects

version: '3.8'

services:
  # PostgreSQL database for SupaConsole metadata (projects, users, env vars)
  db:
    image: postgres:16-alpine
    container_name: supaconsole-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supaconsole}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-supaconsole}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supaconsole}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supaconsole-net

  # SupaConsole application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supaconsole-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database connection
      DATABASE_URL: postgresql://${POSTGRES_USER:-supaconsole}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-supaconsole}
      
      # Next.js configuration
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Please set NEXTAUTH_SECRET}
      
      # OAuth/OIDC for centralized auth (optional - leave empty for local auth)
      OAUTH_ISSUER: ${OAUTH_ISSUER:-}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      OAUTH_AUTHORIZATION_URL: ${OAUTH_AUTHORIZATION_URL:-}
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL:-}
      OAUTH_USERINFO_URL: ${OAUTH_USERINFO_URL:-}
      
      # Email configuration (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@supaconsole.local}
      
      # Node environment
      NODE_ENV: production
    volumes:
      # Mount Docker socket for managing Supabase project containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent storage for Supabase projects
      - supabase_projects:/app/supabase-projects
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - supaconsole-net
    labels:
      # Traefik labels (optional - uncomment if using Traefik)
      # - "traefik.enable=true"
      # - "traefik.http.routers.supaconsole.rule=Host(`supaconsole.yourdomain.com`)"
      # - "traefik.http.routers.supaconsole.entrypoints=websecure"
      # - "traefik.http.routers.supaconsole.tls.certresolver=letsencrypt"
      # - "traefik.http.services.supaconsole.loadbalancer.server.port=3000"

  # Authentik - Centralized SSO/Auth for all lab projects (OPTIONAL)
  # Uncomment this section if you want centralized authentication
  # authentik-db:
