  #     POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD:?Please set AUTHENTIK_DB_PASSWORD}
  #     POSTGRES_DB: ${AUTHENTIK_DB_NAME:-authentik}
  #   volumes:
  #     - authentik_db:/var/lib/postgresql/data
  #   networks:
  #     - supaconsole-net

  # authentik-redis:
  #   image: redis:alpine
  #   container_name: authentik-redis
  #   restart: unless-stopped
  #   networks:
  #     - supaconsole-net

  # authentik-server:
  #   image: ghcr.io/goauthentik/server:latest
  #   container_name: authentik-server
  #   restart: unless-stopped
  #   command: server
  #   depends_on:
  #     - authentik-db
  #     - authentik-redis
  #   environment:
  #     AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?Please set AUTHENTIK_SECRET_KEY}
  #     AUTHENTIK_POSTGRESQL__HOST: authentik-db
  #     AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME:-authentik}
  #     AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER:-authentik}
  #     AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
  #     AUTHENTIK_REDIS__HOST: authentik-redis
  #     AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
  #   volumes:
  #     - authentik_media:/media
  #     - authentik_templates:/templates
  #   ports:
  #     - "${AUTHENTIK_PORT_HTTP:-9000}:9000"
  #     - "${AUTHENTIK_PORT_HTTPS:-9443}:9443"
  #   networks:
