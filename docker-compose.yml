# Docker Compose for the SupaConsole control plane.
# Use deploy/docker-compose.production.yml when you want the bundled NGINX reverse-proxy path.

services:
  # SupaConsole application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supaconsole-app
    restart: unless-stopped
    environment:
      # Control plane metadata store
      DATABASE_URL: ${DATABASE_URL:-file:/app/.supaconsole/control-plane.db}

      # App runtime configuration
      APP_NAME: ${APP_NAME:-SupaConsole}
      APP_URL: ${APP_URL:-http://localhost:3000}
      APP_PORT: ${APP_PORT:-3000}

      # Phase 4 operational surfaces
      SUPACONSOLE_TOPOLOGY_SETTINGS_FILE: ${SUPACONSOLE_TOPOLOGY_SETTINGS_FILE:-.supaconsole/shared-topology.json}
      SUPACONSOLE_SECRET_FILE: ${SUPACONSOLE_SECRET_FILE:-.supaconsole/secrets.json}
      SUPACONSOLE_BACKUP_DIR: ${SUPACONSOLE_BACKUP_DIR:-.supaconsole/backups}
      SUPACONSOLE_LIFECYCLE_LOG_FILE: ${SUPACONSOLE_LIFECYCLE_LOG_FILE:-.supaconsole/logs/lifecycle.jsonl}
      SUPACONSOLE_PROJECT_JWT_SECRET: ${SUPACONSOLE_PROJECT_JWT_SECRET:-}

      # Optional shared-topology bootstrap values
      SUPACONSOLE_SHARED_TOPOLOGY_NAME: ${SUPACONSOLE_SHARED_TOPOLOGY_NAME:-}
      SUPACONSOLE_DEFAULT_INSTANCE_MODE: ${SUPACONSOLE_DEFAULT_INSTANCE_MODE:-full_stack_isolated}
      SUPACONSOLE_SHARED_PG_ADMIN_URL: ${SUPACONSOLE_SHARED_PG_ADMIN_URL:-}
      SUPACONSOLE_SHARED_PG_SCHEMA_DATABASE: ${SUPACONSOLE_SHARED_PG_SCHEMA_DATABASE:-}
      SUPACONSOLE_SHARED_PG_ADMIN_DATABASE: ${SUPACONSOLE_SHARED_PG_ADMIN_DATABASE:-}
      SUPACONSOLE_SHARED_SERVICE_API_URL: ${SUPACONSOLE_SHARED_SERVICE_API_URL:-}
      SUPACONSOLE_SHARED_SERVICE_STUDIO_URL: ${SUPACONSOLE_SHARED_SERVICE_STUDIO_URL:-}
      SUPACONSOLE_SHARED_SERVICE_DATABASE_URL: ${SUPACONSOLE_SHARED_SERVICE_DATABASE_URL:-}
      SUPACONSOLE_SHARED_SERVICE_AUTH_URL: ${SUPACONSOLE_SHARED_SERVICE_AUTH_URL:-}
      SUPACONSOLE_SHARED_SERVICE_STORAGE_URL: ${SUPACONSOLE_SHARED_SERVICE_STORAGE_URL:-}
      SUPACONSOLE_SHARED_SERVICE_REALTIME_URL: ${SUPACONSOLE_SHARED_SERVICE_REALTIME_URL:-}
      SUPACONSOLE_SHARED_SERVICE_MAIL_URL: ${SUPACONSOLE_SHARED_SERVICE_MAIL_URL:-}

      # OAuth/OIDC for centralized auth (optional - leave empty for local auth)
      OAUTH_ISSUER: ${OAUTH_ISSUER:-}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      OAUTH_AUTHORIZATION_URL: ${OAUTH_AUTHORIZATION_URL:-}
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL:-}
      OAUTH_USERINFO_URL: ${OAUTH_USERINFO_URL:-}
      
      # Email configuration (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      
      # Node environment
      NODE_ENV: production
    volumes:
      # Mount Docker socket for managing Supabase project containers
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # Persist Phase 4 operational data for config, secrets, backups, and lifecycle logs
      - supaconsole_state:/app/.supaconsole
      # Persistent storage for Supabase projects
      - supabase_projects:/app/supabase-projects
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - supaconsole-net
    # Traefik labels can be added here if you deploy behind Traefik instead of the bundled NGINX example.

